<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — Cargo-Ledger</title>
<link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="logo" style="margin-bottom:20px">
      <img src="{{ url_for('static', filename='img/cargoledger_logo.png') }}"
           alt="Cargo-Ledger"
           style="height:52px;width:auto;object-fit:contain">
      <div style="font-size:11px;color:var(--muted);margin-top:6px">
        Weighbridge Monitoring Portal
      </div>
    </div>
    <h2>Sign In</h2>
    <p class="sub">Manager &amp; Government Access</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="your@email.com" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter password" required>
      </div>
      <button class="btn btn-navy"
              style="width:100%;justify-content:center;padding:12px;font-size:14px;margin-top:6px">
        Sign In →
      </button>
    </form>
    <p style="text-align:center;margin-top:18px;font-size:11px;color:var(--muted)">
      Contact <strong>Trionex Labs</strong> for access credentials.
    </p>
  </div>
</div>
</body>
</html>
